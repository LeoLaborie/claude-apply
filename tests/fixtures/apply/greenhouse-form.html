<!DOCTYPE html>
<html><body>
<form id="application_form">
  <label for="first_name">First Name</label>
  <input type="text" name="first_name" id="first_name" required>

  <label for="last_name">Last Name</label>
  <input type="text" name="last_name" id="last_name" required>

  <label for="email">Email</label>
  <input type="email" name="email" id="email" required>

  <label for="phone">Phone</label>
  <input type="tel" name="phone" id="phone">

  <label for="resume">Resume/CV</label>
  <input type="file" name="resume" id="resume" required>

  <label for="cover_letter">Cover Letter</label>
  <input type="file" name="cover_letter" id="cover_letter">

  <label for="linkedin">LinkedIn Profile</label>
  <input type="url" name="linkedin" id="linkedin">

  <label for="github">GitHub</label>
  <input type="url" name="github" id="github">

  <label for="school">School</label>
  <input type="text" name="school" id="school">

  <label for="degree">Degree</label>
  <input type="text" name="degree" id="degree">

  <label for="why">Why do you want to work here?</label>
  <textarea name="why" id="why"></textarea>

  <label for="gender">Gender Identity</label>
  <select name="gender" id="gender"><option>Prefer not to say</option></select>

  <label for="veteran">Veteran Status</label>
  <select name="veteran" id="veteran"><option>Prefer not to say</option></select>

  <label for="disability">Disability Status</label>
  <select name="disability" id="disability"><option>Prefer not to say</option></select>

  <button type="submit">Submit Application</button>
</form>
</body></html>
