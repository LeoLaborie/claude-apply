<!doctype html>
<html>
  <body>
    <form>
      <label for="name">Full Name</label>
      <input type="text" name="name" id="name" required />

      <label for="email">Email</label>
      <input type="email" name="email" id="email" required />

      <label for="phone">Phone</label>
      <input type="tel" name="phone" id="phone" />

      <label for="resume">Resume/CV</label>
      <input type="file" name="resume" id="resume" required />

      <label for="urls[LinkedIn]">LinkedIn URL</label>
      <input type="url" name="urls[LinkedIn]" id="urls[LinkedIn]" />

      <label for="urls[GitHub]">GitHub URL</label>
      <input type="url" name="urls[GitHub]" id="urls[GitHub]" />

      <label for="urls[Portfolio]">Portfolio / Website</label>
      <input type="url" name="urls[Portfolio]" id="urls[Portfolio]" />

      <label for="comments">Additional Information</label>
      <textarea name="comments" id="comments"></textarea>

      <label>
        <input type="checkbox" name="consent" id="consent" required />
        I consent to data processing
      </label>

      <button type="submit">Submit Application</button>
    </form>
    <script>
      document.querySelector('form').addEventListener('submit', (e) => {
        e.preventDefault();
        document.body.innerHTML = '<h1>Thank you for your application!</h1>';
      });
    </script>
  </body>
</html>
