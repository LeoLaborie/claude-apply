# Candidate profile — used by /apply to fill forms.
# Copy this file to config/candidate-profile.yml and fill in your details.
# NEVER commit config/candidate-profile.yml (it's in .gitignore).

identity:
  first_name: Alice
  last_name: Martin
  email: alice.martin@example.com
  phone: "+33 6 00 00 00 00"
  date_of_birth: "2003-05-15"
  nationality: French
  linkedin: https://www.linkedin.com/in/alice-martin-example/
  github: https://github.com/alice-martin-example
  website: https://alice-martin.example.com

